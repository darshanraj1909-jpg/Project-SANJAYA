<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Audio Monitoring</title>
<style>
:root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8;
  --hazard:#ef4444; --distress:#f59e0b; --normal:#22c55e; --accent:#38bdf8; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); padding:24px; }
h1 { font-size:22px; margin-bottom:4px; }
.sub { color:var(--muted); margin-bottom:20px; font-size:13px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:20px; }
.card { background:var(--card); border-radius:12px; padding:18px; }
.label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
.value { font-size:26px; font-weight:600; margin-top:6px; }
.dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
.ok { background:var(--normal); } .err { background:var(--hazard); }
.pred-Hazard { color:var(--hazard); } .pred-Distress { color:var(--distress); }
.pred-Normal { color:var(--normal); } .pred-\- { color:var(--muted); }
.bar { height:8px; background:#334155; border-radius:4px; overflow:hidden; margin-top:10px; }
.bar > div { height:100%; background:var(--accent); width:0%; transition:width .3s; }
table { width:100%; border-collapse:collapse; }
th,td { text-align:left; padding:8px 10px; font-size:13px; border-bottom:1px solid #334155; }
th { color:var(--muted); font-weight:500; }
.controls button { background:var(--accent); color:#0f172a; border:none; padding:8px 16px;
  border-radius:8px; font-weight:600; cursor:pointer; margin-right:8px; }
.controls button.stop { background:var(--hazard); color:#fff; }
.section-title { font-size:14px; margin:24px 0 10px; color:var(--muted); }
</style>
</head>
<body>
<h1>Hospital Audio Monitoring System</h1>
<div class="sub">Real-time acoustic event detection</div>

<div class="grid">
  <div class="card"><div class="label">Microphone</div>
    <div class="value"><span id="mic-dot" class="dot"></span><span id="mic">-</span></div></div>
  <div class="card"><div class="label">Listening</div>
    <div class="value" id="listening">-</div><div class="sub" id="status" style="margin:6px 0 0;">-</div></div>
  <div class="card"><div class="label">Current Prediction</div>
    <div class="value" id="prediction">-</div>
    <div class="bar"><div id="conf-bar"></div></div>
    <div class="sub" id="confidence" style="margin:6px 0 0;">-</div></div>
  <div class="card"><div class="label">Today · Hazard</div>
    <div class="value pred-Hazard" id="hazard-count">0</div></div>
  <div class="card"><div class="label">Today · Distress</div>
    <div class="value pred-Distress" id="distress-count">0</div></div>
</div>

<div class="controls">
  <button onclick="ctrl('start')">Start</button>
  <button class="stop" onclick="ctrl('stop')">Stop</button>
</div>

<div class="section-title">Recent Alerts</div>
<div class="card">
  <table>
    <thead><tr><th>Time</th><th>Type</th><th>Confidence</th><th>File</th></tr></thead>
    <tbody id="alerts"><tr><td colspan="4" style="color:var(--muted)">No alerts yet</td></tr></tbody>
  </table>
</div>

<script src="/static/app.js"></script>
</body>
</html>
